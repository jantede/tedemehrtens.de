name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Please review this pull request for the tedemehrtens.de Jekyll portfolio/blog site.

            Focus on:
            - Correctness of Jekyll/Liquid templates and front matter
            - SCSS/CSS quality and consistency with the existing conventions (variables, mixins, partials)
            - JavaScript correctness and security (no XSS, no unintended globals)
            - Markdown formatting and frontmatter in blog posts
            - Accessibility issues in HTML templates
            - Any breaking changes to the theme system, tag system, or navigation
            - Potential security issues (e.g. unescaped user content, unsafe links)

            Be concise and actionable. Only comment on real issues — skip style nits unless they violate the conventions documented in CLAUDE.md.
