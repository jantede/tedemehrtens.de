name: Cloudflare Deploy

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.action != 'closed'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Install webp tools (for jekyll-webp)
        run: sudo apt-get install -y webp

      - name: Build site
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bundle exec jekyll build --drafts --future
          else
            bundle exec jekyll build
          fi

      - name: Deploy to Cloudflare (production)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d998b17e1baa0e6a39d1da451ff47c16

      - name: Deploy preview to Cloudflare
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        id: preview
        run: |
          WORKER_NAME="portfolio-pr-${{ github.event.pull_request.number }}"
          npx wrangler deploy --name "$WORKER_NAME" 2>&1 | tee deploy-output.txt
          # Extract the deployed URL from wrangler output
          PREVIEW_URL=$(grep -o 'https://[^ ]*workers\.dev' deploy-output.txt | head -1 || echo "")
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d998b17e1baa0e6a39d1da451ff47c16

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.preview.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview_url }}';
            const body = `### Cloudflare Preview Deployed\n\n**Preview URL:** ${previewUrl}\n\nThis preview will be cleaned up when the PR is closed.`;
            const marker = '### Cloudflare Preview Deployed';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && !github.event.pull_request.head.repo.fork
    steps:
      - name: Delete preview worker
        run: echo y | npx wrangler delete --name "portfolio-pr-${{ github.event.pull_request.number }}"
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d998b17e1baa0e6a39d1da451ff47c16
