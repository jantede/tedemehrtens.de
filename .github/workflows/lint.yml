name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint HTML (source templates)
        run: npm run lint:html

      - name: Lint Markdown
        run: npm run lint:md

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Install webp tools (for jekyll-webp)
        run: sudo apt-get install -y webp

      - name: Build site
        run: bundle exec jekyll build

      - name: Lint generated HTML (_site)
        run: npm run lint:html-site
