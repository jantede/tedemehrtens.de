name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint source files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint HTML (source templates)
        run: npm run lint:html

      - name: Lint Markdown
        run: npm run lint:md

  build-and-lint:
    name: Build site and lint output
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Build site
        run: |
          printf 'webp:\n  enabled: false\n' > /tmp/no-webp.yml
          bundle exec jekyll build --config _config.yml,/tmp/no-webp.yml

      - name: Lint generated HTML (_site)
        run: npm run lint:html-site
