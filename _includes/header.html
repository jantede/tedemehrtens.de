<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function() {
      var mode = localStorage.getItem('theme-mode') || 'auto';
      var sys  = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme     = (mode === 'auto') ? sys : mode;
    })();
  </script>

  <!-- Preload critical image if specified by the page -->
  {% if page.preload_image %}
  <link rel="preload" as="image" href="{{ page.preload_image }}" type="image/webp">
  {% endif %}

  <!-- Fonts: preconnect + async load to avoid render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/assets/css/portfolio.css?v={{ site.time | date: '%s' }}">

  <!-- Feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/feed.xml">
</head>
<body>
{% include navbar.html %}
