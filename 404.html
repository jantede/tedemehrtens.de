<style>
  .e-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .e-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: calc(var(--nav-height) + 2rem) 1.5rem 4rem;
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  .e-code {
    font-size: clamp(7rem, 22vw, 14rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 0.15em;
  }

  .e-title {
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 600;

  }

  .e-desc {
    color: var(--text-muted);

    margin-bottom: 2rem;
  }

  .e-action { pointer-events: all; }
</style>

<canvas class="e-canvas" id="errorCanvas"></canvas>

<main class="e-page">
  <p class="e-code">404</p>
  <h1 class="e-title">Lost in the void.</h1>
  <p class="e-desc">Whatever you were looking for isn't here — it may have moved or never existed.</p>
  <a href="/" class="btn btn-primary e-action">← Back home</a>
</main>

<script>
(function () {
  const canvas = document.getElementById('errorCanvas');
  const ctx    = canvas.getContext('2d');

  const N            = 65;    // node count
  const MAX_EDGE     = 120;   // max distance to draw a connection
  const REVEAL_R     = 200;   // cursor reveal radius
  const GHOST_NODE   = 0.06;  // base node opacity (hint to user)
  const GHOST_EDGE   = 0.04;  // base edge opacity

  let mx = -9999, my = -9999;
  let autoAnimate = true;     // true until first mousemove
  let tick = 0;

  const THEMES = {
    dark:  [88,  166, 255],
    light: [9,   105, 218],
  };

  function accent() {
    return THEMES[document.documentElement.dataset.theme] || THEMES.light;
  }

  // Nodes: position + slow drift velocity
  let nodes = [];

  function initNodes() {
    nodes = Array.from({ length: N }, () => ({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
    }));
  }

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    initNodes();
  }

  // Distance from point P to segment AB
  function ptSegDist(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(px - ax, py - ay);
    const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
  }

  function smoothstep(t) { return t * t * (3 - 2 * t); }

  function draw() {
    tick += 0.006;

    // Auto-orbit cursor until the user moves their mouse
    if (autoAnimate) {
      mx = canvas.width  / 2 + Math.cos(tick)        * canvas.width  * 0.28;
      my = canvas.height / 2 + Math.sin(tick * 0.71) * canvas.height * 0.22;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const [r, g, b] = accent();

    // Drift nodes and bounce off walls
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    }

    // --- Edges ---
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        const nodeDist = Math.hypot(a.x - b.x, a.y - b.y);
        if (nodeDist > MAX_EDGE) continue;

        // Fade edge based on length (shorter = more opaque)
        const edgeFade = 1 - nodeDist / MAX_EDGE;

        // Reveal based on proximity of cursor to the segment
        const segDist  = ptSegDist(mx, my, a.x, a.y, b.x, b.y);
        const revealed = smoothstep(Math.max(0, 1 - segDist / REVEAL_R));

        const alpha = Math.max(GHOST_EDGE * edgeFade, revealed * edgeFade * 0.75);
        if (alpha < 0.01) continue;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth   = 0.75 + revealed * 0.75;
        ctx.stroke();
      }
    }

    // --- Nodes ---
    for (const n of nodes) {
      const d        = Math.hypot(mx - n.x, my - n.y);
      const revealed = smoothstep(Math.max(0, 1 - d / REVEAL_R));
      const alpha    = Math.max(GHOST_NODE, revealed * 0.9);
      const radius   = 2 + revealed * 2.5;

      ctx.beginPath();
      ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('mousemove', e => {
    autoAnimate = false;
    mx = e.clientX;
    my = e.clientY;
  });

  window.addEventListener('touchmove', e => {
    autoAnimate = false;
    mx = e.touches[0].clientX;
    my = e.touches[0].clientY;
  }, { passive: true });

  window.addEventListener('resize', resize);

  resize();
  draw();
})();
</script>
