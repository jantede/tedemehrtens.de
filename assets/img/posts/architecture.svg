<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="300" fill="#0d1117" rx="12"/>

  <!-- Obsidian -->
  <rect x="40" y="100" width="140" height="100" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="110" y="145" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">Obsidian</text>
  <text x="110" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Write Markdown</text>
  <text x="110" y="182" text-anchor="middle" fill="#6b7280" font-size="11">+ Templates</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="150" x2="230" y2="150" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="205" y="142" text-anchor="middle" fill="#4b5563" font-size="10">git push</text>

  <!-- GitHub -->
  <rect x="230" y="100" width="140" height="100" rx="10" fill="#1e1e2e" stroke="#6b7280" stroke-width="2"/>
  <text x="300" y="145" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="bold">GitHub</text>
  <text x="300" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Version Control</text>
  <text x="300" y="182" text-anchor="middle" fill="#6b7280" font-size="11">Source of Truth</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="150" x2="420" y2="150" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="142" text-anchor="middle" fill="#4b5563" font-size="10">trigger</text>

  <!-- Cloudflare -->
  <rect x="420" y="100" width="140" height="100" rx="10" fill="#1e1e2e" stroke="#f97316" stroke-width="2"/>
  <text x="490" y="138" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Cloudflare</text>
  <text x="490" y="155" text-anchor="middle" fill="#6b7280" font-size="11">jekyll build</text>
  <text x="490" y="172" text-anchor="middle" fill="#6b7280" font-size="11">Global CDN</text>
  <text x="490" y="189" text-anchor="middle" fill="#6b7280" font-size="11">~300 PoPs</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="150" x2="610" y2="150" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="142" text-anchor="middle" fill="#4b5563" font-size="10">serve</text>

  <!-- User -->
  <rect x="610" y="100" width="140" height="100" rx="10" fill="#1e1e2e" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="145" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Visitor</text>
  <text x="680" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Static HTML</text>
  <text x="680" y="182" text-anchor="middle" fill="#6b7280" font-size="11">from nearest PoP</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
